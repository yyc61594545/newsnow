on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"   # 00:05 UTC = 08:05 北京时间，每天

jobs:
  run:
    uses: ./.github/workflows/research.yml
    with:
      task_id: money
      title: 搞钱与撸毛
      platforms: "Reddit, Polymarket, YouTube"
      max_items: 12
    secrets: inherit
